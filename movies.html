<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>dll. | movies</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Calistoga&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: url('https://raw.githubusercontent.com/murt391/dllontop/main/pnfe3hsy5d4c1.png') no-repeat center center fixed;
            background-size: cover;
            min-height: 100vh;
            width: 100vw;
            overflow-x: hidden;
            font-family: 'Calistoga', serif;
            color: white;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            z-index: 1;
        }

        .container {
            position: relative;
            z-index: 2;
            width: 100%;
            max-width: 1200px;
            margin: 0 auto;
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .header {
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 40px;
        }

        .add-btn {
            background: rgba(180, 161, 255, 0.2);
            border: 1px solid #b4a1ff;
            color: white;
            padding: 10px 20px;
            border-radius: 20px;
            cursor: pointer;
            font-family: 'Calistoga', serif;
            transition: all 0.3s ease;
        }

        .add-btn:hover {
            background: #b4a1ff;
            transform: translateY(-2px);
        }

        .movies-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 25px;
            width: 100%;
        }

        .movie-card {
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            overflow: hidden;
            transition: all 0.3s ease;
            backdrop-filter: blur(5px);
            position: relative;
        }

        .movie-card:hover {
            transform: scale(1.02);
            border-color: #b4a1ff;
        }

        .video-container {
            width: 100%;
            aspect-ratio: 16 / 9;
            background: black;
        }

        .video-container video, .video-container iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        .movie-info {
            padding: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .movie-title {
            font-size: 1rem;
            color: white;
        }

        .delete-btn {
            color: #ff4a4a;
            cursor: pointer;
            opacity: 0.6;
            transition: opacity 0.3s;
            font-size: 0.8rem;
        }

        .delete-btn:hover {
            opacity: 1;
        }

        .back-btn {
            position: fixed;
            top: 20px;
            left: 20px;
            z-index: 3;
            color: white;
            text-decoration: none;
            opacity: 0.8;
            transition: all 0.3s;
            font-size: 1rem;
            text-shadow: 0 2px 4px rgba(0, 0, 0, 0.5);
        }

        .back-btn:hover {
            opacity: 1;
            color: #b4a1ff;
        }

        /* Modal Styles */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            z-index: 100;
            justify-content: center;
            align-items: center;
        }

        .modal-content {
            background: #1a1a1a;
            padding: 30px;
            border-radius: 20px;
            width: 90%;
            max-width: 400px;
            border: 1px solid #b4a1ff;
        }

        .modal-content h2 {
            margin-bottom: 20px;
            color: #b4a1ff;
        }

        .modal-content input {
            width: 100%;
            padding: 12px;
            margin-bottom: 15px;
            border-radius: 10px;
            border: 1px solid #333;
            background: #000;
            color: white;
            font-family: 'Calistoga', serif;
        }

        .modal-buttons {
            display: flex;
            gap: 10px;
        }

        .modal-buttons button {
            flex: 1;
            padding: 10px;
            border-radius: 10px;
            cursor: pointer;
            font-family: 'Calistoga', serif;
        }

        .save-btn {
            background: #b4a1ff;
            color: black;
            border: none;
        }

        .cancel-btn {
            background: transparent;
            color: white;
            border: 1px solid #333;
        }
    </style>
</head>
<body>
    <a href="index.html" class="back-btn">← back</a>

    <div class="container">
        <div class="header">
            <h1>movies</h1>
        </div>

        <div class="movies-grid" id="moviesGrid">
            <!-- Movies will be loaded here -->
        </div>
    </div>

    <!-- Add Movie Modal -->

    <script>
        const moviesGrid = document.getElementById('moviesGrid');
        const addModal = document.getElementById('addModal');

        // Load movies from localStorage
        function loadMovies() {
            const movies = JSON.parse(localStorage.getItem('dll_movies') || '[]');
            moviesGrid.innerHTML = '';

            // Add placeholder if empty
            if (movies.length === 0) {
                movies.push({
                    id: Date.now(),
                    name: 'rickroll',
                    url: 'https://www.youtube.com/watch?v=dQw4w9WgXcQ'
                });
            }

            movies.forEach(movie => {
                const card = document.createElement('div');
                card.className = 'movie-card';
                
                let videoHtml = '';
                if (movie.url.includes('youtube.com') || movie.url.includes('youtu.be')) {
                    const videoId = getYouTubeId(movie.url);
                    videoHtml = `<iframe src="https://www.youtube.com/embed/${videoId}" allowfullscreen></iframe>`;
                } else {
                    videoHtml = `<video src="${movie.url}" controls></video>`;
                }
                moviesGrid.appendChild(card);
            });
        }

        function getYouTubeId(url) {
            const regExp = /^.*(youtu.be\/|v\/|u\/\w\/|embed\/|watch\?v=|\&v=)([^#\&\?]*).*/;
            const match = url.match(regExp);
            return (match && match[2].length === 11) ? match[2] : null;
        }

        function openModal() {
            addModal.style.display = 'flex';
        }

        function closeModal() {
            addModal.style.display = 'none';
        }

        function saveMovie() {
            const name = document.getElementById('movieName').value;
            const url = document.getElementById('movieUrl').value;

            if (!name || !url) return alert('please fill in all fields');

            const movies = JSON.parse(localStorage.getItem('dll_movies') || '[]');
            movies.push({
                id: Date.now(),
                name: name,
                url: url
            });

            localStorage.setItem('dll_movies', JSON.stringify(movies));
            document.getElementById('movieName').value = '';
            document.getElementById('movieUrl').value = '';
            closeModal();
            loadMovies();
        }

        function deleteMovie(id) {
            let movies = JSON.parse(localStorage.getItem('dll_movies') || '[]');
            movies = movies.filter(m => m.id !== id);
            localStorage.setItem('dll_movies', JSON.stringify(movies));
            loadMovies();
        }

        // Initialize
        loadMovies();
    </script>
</body>
</html>
