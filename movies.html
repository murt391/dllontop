<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>dll. | dlltube</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Calistoga&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: url('https://raw.githubusercontent.com/murt391/dllontop/main/pnfe3hsy5d4c1.png') no-repeat center center fixed;
            background-size: cover;
            min-height: 100vh;
            width: 100vw;
            overflow-x: hidden;
            font-family: 'Calistoga', serif;
            color: white;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            z-index: 1;
        }

        .container {
            position: relative;
            z-index: 2;
            width: 100%;
            max-width: 1200px;
            margin: 0 auto;
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .header {
            width: 100%;
            text-align: center;
            margin-bottom: 40px;
        }

        .header h1 {
            font-size: 2.5rem;
            color: white;
            text-shadow: 0 0 20px rgba(180, 161, 255, 0.5);
        }

        .movies-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 25px;
            width: 100%;
        }

        .movie-card {
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            overflow: hidden;
            transition: all 0.3s ease;
            backdrop-filter: blur(5px);
        }

        .movie-card:hover {
            transform: scale(1.02);
            border-color: #b4a1ff;
        }

        .video-container {
            width: 100%;
            aspect-ratio: 16 / 9;
            background: black;
        }

        .video-container video, .video-container iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        .movie-info {
            padding: 15px;
            text-align: center;
        }

        .movie-title {
            font-size: 1rem;
            color: white;
        }

        .back-btn {
            position: fixed;
            top: 20px;
            left: 20px;
            z-index: 3;
            color: white;
            text-decoration: none;
            opacity: 0.8;
            transition: all 0.3s;
            font-size: 1rem;
            text-shadow: 0 2px 4px rgba(0, 0, 0, 0.5);
        }

        .back-btn:hover {
            opacity: 1;
            color: #b4a1ff;
        }
    </style>
</head>
<body>
    <a href="index.html" class="back-btn">← back</a>

    <div class="container">
        <div class="header">
            <h1>dlltube</h1>
        </div>

        <div class="movies-grid" id="moviesGrid">
            <!-- Add movies here by copying the template below -->
            
            <!-- Movie Template -->
            <div class="movie-card">
                <div class="video-container">
                    <iframe src="https://www.youtube.com/embed/dQw4w9WgXcQ" allowfullscreen></iframe>
                </div>
                <div class="movie-info">
                    <span class="movie-title">Welcome to dlltube</span>
                </div>
            </div>
            
            <!-- End of Movie List -->
        </div>
    </div>
</body>
</html>
