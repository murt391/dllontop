<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>dll</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Calistoga&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: url('https://raw.githubusercontent.com/murt391/dllontop/main/pnfe3hsy5d4c1.webp') no-repeat center center fixed;
            background-size: cover;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Calistoga', serif;
            color: white;
        }

        /* Overlay to ensure text readability */
        body::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.4);
            z-index: 1;
        }

        .content {
            position: relative;
            z-index: 2;
            text-align: center;
            pointer-events: none;
            user-select: none;
        }

        .title {
            font-size: 6rem;
            margin-bottom: 0.2rem;
            letter-spacing: 4px; /* Increased letter spacing */
            text-shadow: 0 0 30px rgba(0, 0, 0, 0.5);
        }

        .title span.d { color: white; }
        .title span.ll { color: #b4a1ff; }

        .subtitle {
            font-size: 1.2rem;
            opacity: 0.9;
            margin-bottom: 2.5rem;
            min-height: 1.5em;
            text-shadow: 0 2px 4px rgba(0, 0, 0, 0.5);
            letter-spacing: 1px;
        }

        .central-icons {
            display: flex;
            justify-content: center;
            gap: 2.5rem;
            pointer-events: auto;
        }

        .icon-link {
            color: white;
            text-decoration: none;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            opacity: 0.9;
            width: 45px;
            height: 45px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .icon-link:hover {
            transform: scale(1.2) translateY(-5px);
            opacity: 1;
            filter: drop-shadow(0 0 10px rgba(180, 161, 255, 0.8));
        }

        /* Floating Bottom Bar */
        .bottom-bar {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 10;
            background: rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 40px;
            padding: 10px 25px;
            display: flex;
            align-items: center;
            gap: 30px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            pointer-events: auto;
        }

        .bar-link {
            color: white;
            text-decoration: none;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            opacity: 0.8;
            width: 30px;
            height: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .bar-link:hover {
            transform: scale(1.2) translateY(-5px);
            opacity: 1;
            color: #b4a1ff;
            filter: drop-shadow(0 0 8px rgba(180, 161, 255, 0.6));
        }

        .bar-link svg, .icon-link svg {
            width: 100%;
            height: 100%;
        }

        .cloak-container {
            position: absolute;
            bottom: 100px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 3;
            pointer-events: auto;
        }

        .cloak-button {
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: white;
            padding: 8px 16px;
            border-radius: 20px;
            font-family: 'Calistoga', serif;
            font-size: 0.8rem;
            cursor: pointer;
            transition: all 0.3s ease;
            backdrop-filter: blur(5px);
            text-transform: lowercase;
            opacity: 0.8;
        }

        .cloak-button:hover {
            background: rgba(180, 161, 255, 0.2);
            border-color: #b4a1ff;
            opacity: 1;
            transform: translateY(-2px);
        }

        .settings-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 10;
            color: white;
            opacity: 0.8;
            transition: all 0.3s ease;
            width: 30px;
            height: 30px;
            cursor: pointer;
        }

        .settings-btn:hover {
            opacity: 1;
            color: #b4a1ff;
            transform: rotate(90deg);
        }

        #bgMusic {
            display: none;
        }
    </style>
</head>
<body>

    <audio id="bgMusic" loop>
        <source id="musicSource" src="https://github.com/murt391/dllontop/raw/refs/heads/main/thepenis.mp3" type="audio/mpeg">
    </audio>

    <script>
        // Background Music Logic
        const bgMusic = document.getElementById('bgMusic');
        const musicSource = document.getElementById('musicSource');
        
        const savedMusic = localStorage.getItem('dll-music-url');
        if (savedMusic) {
            musicSource.src = savedMusic;
            bgMusic.load();
        }
        
        const savedVolume = localStorage.getItem('dll-music-volume');
        if (savedVolume !== null) {
            bgMusic.volume = parseFloat(savedVolume);
        }

        const startMusic = () => {
            bgMusic.play().catch(() => {});
            document.removeEventListener('click', startMusic);
            document.removeEventListener('keydown', startMusic);
        };

        document.addEventListener('click', startMusic);
        document.addEventListener('keydown', startMusic);

        window.addEventListener('load', () => {
            bgMusic.play().catch(() => {});
        });

        // Subtitle System
        const subtitles = [
            "homer drops his donut, doh",
            "dll came from a google doc!",
            "creativity runs wild here.",
            "hamood habibi",
            "dll is actually a file type",
            "play games here",
            "x = twitter",
            "the future of games is here",
            "abcdefghijklmnopqrstuvwxyz",
            "mango mango mango",
            "ive been adding words for so long",
            "i dont know what to say",
            "use dll please?",
            "piracy is fun",
            "WE all drink mustard juice",
            "jackpot x lets get married x cry for me",
            "oh my god a needih!",
            "music makes everything better",
            "turn up the volume!",
            "join the discord for more links!",
            "youtube.com/@dllunblocked",
            "what are you doing stepbro?",
            "credits to gn-math for some stuff",
            "bull-33 is a cool guy",
            "also try selenite!"
        ];
        
        document.getElementById('randomSubtitle').innerText = subtitles[Math.floor(Math.random() * subtitles.length)];

        // Cloak Tab Function
        function cloakTab() {
            const url = window.location.href;
            const win = window.open();
            if (!win) return;
            win.document.body.style.margin = '0';
            win.document.body.style.height = '100vh';
            const iframe = win.document.createElement('iframe');
            iframe.style.border = 'none';
            iframe.style.width = '100%';
            iframe.style.height = '100%';
            iframe.style.margin = '0';
            iframe.src = url;
            win.document.body.appendChild(iframe);
        }
    </script>
