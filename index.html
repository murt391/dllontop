<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #1a0033;
            --gradient-start: #3a0066;
            --gradient-end: #0d001a;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--bg-color);
            background: radial-gradient(circle at center, var(--gradient-start) 0%, var(--gradient-end) 100%);
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Fredoka', sans-serif;
            color: white;
        }

        #particleCanvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            display: block;
        }

        .content {
            position: relative;
            z-index: 2;
            text-align: center;
            pointer-events: none;
            user-select: none;
        }

        .title {
            font-size: 5rem;
            font-weight: 700;
            margin-bottom: 0.2rem;
            letter-spacing: -2px;
            text-shadow: 0 0 30px rgba(255, 255, 255, 0.2);
        }

        .subtitle {
            font-size: 1.1rem;
            opacity: 0.8;
            margin-bottom: 2.5rem;
            font-weight: 400;
            min-height: 1.5em;
        }

        .central-icons {
            display: flex;
            justify-content: center;
            gap: 2.5rem;
            pointer-events: auto;
        }

        .icon-link {
            color: white;
            text-decoration: none;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            opacity: 0.85;
            width: 45px;
            height: 45px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .icon-link:hover {
            transform: scale(1.2) translateY(-5px);
            opacity: 1;
            filter: drop-shadow(0 0 10px rgba(255, 255, 255, 0.5));
        }

        /* Floating Bottom Bar */
        .bottom-bar {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 10;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 40px;
            padding: 10px 25px;
            display: flex;
            align-items: center;
            gap: 30px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            pointer-events: auto;
        }

        .bar-link {
            color: white;
            text-decoration: none;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            opacity: 0.7;
            width: 30px;
            height: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .bar-link:hover {
            transform: scale(1.2) translateY(-5px);
            opacity: 1;
            filter: drop-shadow(0 0 8px rgba(255, 255, 255, 0.5));
        }

        .bar-link svg, .icon-link svg {
            width: 100%;
            height: 100%;
        }

        .cloak-container {
            position: absolute;
            bottom: 100px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 3;
            pointer-events: auto;
        }

        .cloak-button {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: white;
            padding: 8px 16px;
            border-radius: 20px;
            font-family: 'Fredoka', sans-serif;
            font-size: 0.8rem;
            cursor: pointer;
            transition: all 0.3s ease;
            backdrop-filter: blur(5px);
            text-transform: lowercase;
            opacity: 0.6;
        }

        .cloak-button:hover {
            background: rgba(255, 255, 255, 0.2);
            opacity: 1;
            transform: translateY(-2px);
        }

        .settings-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 10;
            color: white;
            opacity: 0.6;
            transition: all 0.3s ease;
            width: 30px;
            height: 30px;
            cursor: pointer;
        }

        .settings-btn:hover {
            opacity: 1;
            transform: rotate(90deg);
        }

        #bgMusic {
            display: none;
        }
    </style>

    <script>
        // Theme Persistence
        const savedStart = localStorage.getItem('dll-theme-start');
        const savedEnd = localStorage.getItem('dll-theme-end');
        if (savedStart && savedEnd) {
            document.documentElement.style.setProperty('--gradient-start', savedStart);
            document.documentElement.style.setProperty('--gradient-end', savedEnd);
        }

        // Background Music Logic
        const bgMusic = document.getElementById('bgMusic');
        const musicSource = document.getElementById('musicSource');
        
        const savedMusic = localStorage.getItem('dll-music-url');
        if (savedMusic) {
            musicSource.src = savedMusic;
            bgMusic.load();
        }
        
        const savedVolume = localStorage.getItem('dll-music-volume');
        if (savedVolume !== null) {
            bgMusic.volume = parseFloat(savedVolume);
        }

        const startMusic = () => {
            bgMusic.play().catch(() => {});
            document.removeEventListener('click', startMusic);
            document.removeEventListener('keydown', startMusic);
        };

        document.addEventListener('click', startMusic);
        document.addEventListener('keydown', startMusic);

        window.addEventListener('load', () => {
            bgMusic.play().catch(() => {});
        });

        // Subtitle System
        const subtitles = [
            "homer drops his donut, doh",
            "dll came from a google doc!",
            "creativity runs wild here.",
            "hamood habibi",
            "dll is actually a file type",
            "play games here",
            "x = twitter",
            "the future of games is here",
            "abcdefghijklmnopqrstuvwxyz",
            "mango mango mango",
            "ive been adding words for so long",
            "i dont know what to say",
            "use dll please?",
            "piracy is fun",
            "WE all drink mustard juice",
            "jackpot x lets get married x cry for me",
            "oh my god a needih!",
            "music makes everything better",
            "turn up the volume!",
            "join the discord for more links!",
            "youtube.com/@dllunblocked",
            "what are you doing stepbro?",
            "credits to gn-math for some stuff",
            "bull-33 is a cool guy",
            "also try selenite!"
        ];
        
        document.getElementById('randomSubtitle').innerText = subtitles[Math.floor(Math.random() * subtitles.length)];

        // Cloak Tab Function
        function cloakTab() {
            const url = window.location.href;
            const win = window.open();
            if (!win) return;
            win.document.body.style.margin = '0';
            win.document.body.style.height = '100vh';
            const iframe = win.document.createElement('iframe');
            iframe.style.border = 'none';
            iframe.style.width = '100%';
            iframe.style.height = '100%';
            iframe.style.margin = '0';
            iframe.src = url;
            win.document.body.appendChild(iframe);
        }

        // Particle System
        const canvas = document.getElementById('particleCanvas');
        const ctx = canvas.getContext('2d');

        let particles = [];
        const particleCount = 180;
        const connectionDistance = 100;
        const mouseRadius = 150;

        let mouse = { x: null, y: null };
        window.addEventListener('mousemove', (event) => { mouse.x = event.x; mouse.y = event.y; });
        window.addEventListener('resize', () => { initCanvas(); });

        function initCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            createParticles();
        }

        class Particle {
            constructor() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.size = Math.random() * 1.5 + 0.5;
                this.speedX = (Math.random() - 0.5) * 0.4;
                this.speedY = (Math.random() - 0.5) * 0.4;
            }
            update() {
                this.x += this.speedX;
                this.y += this.speedY;
                if (this.x > canvas.width) this.x = 0; else if (this.x < 0) this.x = canvas.width;
                if (this.y > canvas.height) this.y = 0; else if (this.y < 0) this.y = canvas.height;
            }
            draw() {
                ctx.fillStyle = 'rgba(255, 255, 255, 0.7)';
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        function createParticles() {
            particles = [];
            for (let i = 0; i < particleCount; i++) particles.push(new Particle());
        }

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            for (let i = 0; i < particles.length; i++) {
                particles[i].update();
                particles[i].draw();
                if (mouse.x !== null && mouse.y !== null) {
                    let dx = particles[i].x - mouse.x;
                    let dy = particles[i].y - mouse.y;
                    let distance = Math.sqrt(dx * dx + dy * dy);
                    if (distance < mouseRadius) {
                        for (let j = i + 1; j < particles.length; j++) {
                            let dx2 = particles[i].x - particles[j].x;
                            let dy2 = particles[i].y - particles[j].y;
                            let distance2 = Math.sqrt(dx2 * dx2 + dy2 * dy2);
                            if (distance2 < connectionDistance) {
                                ctx.strokeStyle = `rgba(255, 255, 255, ${(1 - distance2 / connectionDistance) * 0.5})`;
                                ctx.lineWidth = 0.4;
                                ctx.beginPath();
                                ctx.moveTo(particles[i].x, particles[i].y);
                                ctx.lineTo(particles[j].x, particles[j].y);
                                ctx.stroke();
                            }
                        }
                    }
                }
            }
            requestAnimationFrame(animate);
        }

        initCanvas();
        animate();
    </script>
