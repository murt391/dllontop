<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>dll. | apps</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Calistoga&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: url('https://raw.githubusercontent.com/murt391/dllontop/main/pnfe3hsy5d4c1.png') no-repeat center center fixed;
            background-size: cover;
            height: 100vh;
            width: 100vw;
            overflow-x: hidden;
            font-family: 'Calistoga', serif;
            color: white;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            z-index: 1;
        }

        .container {
            position: relative;
            z-index: 2;
            width: 100%;
            max-width: 1200px;
            margin: 0 auto;
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .search-container {
            width: 100%;
            max-width: 600px;
            margin-bottom: 50px;
        }

        .search-bar {
            width: 100%;
            padding: 15px 25px;
            border-radius: 30px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(10px);
            color: white;
            font-family: 'Calistoga', serif;
            font-size: 1.1rem;
            outline: none;
            transition: all 0.3s ease;
        }

        .search-bar:focus {
            background: rgba(0, 0, 0, 0.6);
            border-color: #b4a1ff;
            box-shadow: 0 0 20px rgba(180, 161, 255, 0.2);
        }

        .apps-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 25px;
            width: 100%;
        }

        .app-card {
            aspect-ratio: 1 / 1;
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            backdrop-filter: blur(5px);
            text-decoration: none;
            color: white;
            overflow: hidden;
            position: relative;
        }

        .app-card:hover {
            transform: scale(1.05) translateY(-5px);
            background: rgba(0, 0, 0, 0.6);
            border-color: #b4a1ff;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        }

        .app-title {
            font-weight: 400;
            font-size: 1.1rem;
            color: white;
            text-align: center;
        }

        .back-btn {
            position: fixed;
            top: 20px;
            left: 20px;
            z-index: 3;
            color: white;
            text-decoration: none;
            opacity: 0.8;
            transition: all 0.3s;
            font-size: 1rem;
            text-shadow: 0 2px 4px rgba(0, 0, 0, 0.5);
        }

        .back-btn:hover {
            opacity: 1;
            color: #b4a1ff;
        }
    </style>
</head>
<body>
    <audio id="bgMusic" loop>
        <source id="musicSource" src="https://github.com/murt391/dllontop/raw/refs/heads/main/thepenis.mp3" type="audio/mpeg">
    </audio>
    
    <a href="index.html" class="back-btn">← back</a>

    <div class="container">
        <div class="search-container">
            <input type="text" class="search-bar" placeholder="search apps..." id="appSearch">
        </div>

        <div class="apps-grid" id="appsGrid">
            <a href="Soundboard.html" class="game-card">
                <img src="https://raw.githubusercontent.com/murt391/dllontop/main/179.png" alt="Soundboard" class="game-thumbnail" onerror="this.src='https://via.placeholder.com/200x200/2e004f/ffffff?text=soundboard'">
                <div class="game-info"><div class="game-title">Soundboard</div></div>
            </a>
        </div>
    </div>

    <script>
        // Background Music Logic
        const bgMusic = document.getElementById('bgMusic');
        const musicSource = document.getElementById('musicSource');
        
        const savedMusic = localStorage.getItem('dll-music-url');
        if (savedMusic) {
            musicSource.src = savedMusic;
            bgMusic.load();
        }
        
        const savedVolume = localStorage.getItem('dll-music-volume');
        if (savedVolume !== null) {
            bgMusic.volume = parseFloat(savedVolume);
        }

        const startMusic = () => {
            bgMusic.play().catch(() => {});
            document.removeEventListener('click', startMusic);
        };
        document.addEventListener('click', startMusic);

        document.getElementById('appSearch').addEventListener('input', (e) => {
            const term = e.target.value.toLowerCase();
            const cards = document.querySelectorAll('.app-card');
            cards.forEach(card => {
                const title = card.querySelector('.app-title')?.innerText.toLowerCase();
                if (title) card.style.display = title.includes(term) ? 'flex' : 'none';
            });
        });
    </script>
</body>
</html>
