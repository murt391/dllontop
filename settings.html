<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>dll. | settings</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Calistoga&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: url('https://raw.githubusercontent.com/murt391/dllontop/main/pnfe3hsy5d4c1.png') no-repeat center center fixed;
            background-size: cover;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Calistoga', serif;
            color: white;
        }

        body::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            z-index: 1;
        }

        .settings-card {
            position: relative;
            z-index: 2;
            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 30px;
            padding: 40px;
            width: 100%;
            max-width: 500px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
        }

        h1 {
            font-size: 2.5rem;
            margin-bottom: 30px;
            text-align: center;
            color: #b4a1ff;
        }

        .setting-group {
            margin-bottom: 25px;
        }

        label {
            display: block;
            margin-bottom: 10px;
            font-size: 1.1rem;
            opacity: 0.9;
        }

        select, input[type="range"] {
            width: 100%;
            padding: 12px;
            border-radius: 15px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            background: rgba(0, 0, 0, 0.3);
            color: white;
            font-family: 'Calistoga', serif;
            outline: none;
            cursor: pointer;
        }

        select option {
            background: #1a1a1a;
            color: white;
        }

        .back-btn {
            display: block;
            width: 100%;
            padding: 15px;
            margin-top: 20px;
            border-radius: 15px;
            border: none;
            background: #b4a1ff;
            color: #000;
            font-family: 'Calistoga', serif;
            font-size: 1.1rem;
            font-weight: bold;
            text-align: center;
            text-decoration: none;
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .back-btn:hover {
            background: white;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(180, 161, 255, 0.4);
        }

        #bgMusic {
            display: none;
        }
    </style>
</head>
<body>
    <audio id="bgMusic" loop>
        <source id="musicSource" src="https://github.com/murt391/dllontop/raw/refs/heads/main/thepenis.mp3" type="audio/mpeg">
    </audio>

    <div class="settings-card">
        <h1>settings</h1>

        <div class="setting-group">
            <label for="musicSelect">background music</label>
            <select id="musicSelect">
                <option value="default">Default Music</option>
                <option value="lofi">Wii Menu</option>
                <option value="chill">Wii Shop</option>
                <option value="charlie">Charlie Kirk Funk</option>
                <option value="none">None (Mute)</option>
            </select>
        </div>

        <div class="setting-group">
            <label for="volumeSlider">volume</label>
            <input type="range" id="volumeSlider" min="0" max="1" step="0.01" value="1">
        </div>

        <a href="index.html" class="back-btn">back to home</a>
    </div>

    <script>
        const bgMusic = document.getElementById('bgMusic');
        const musicSource = document.getElementById('musicSource');
        const musicSelect = document.getElementById('musicSelect');
        const volumeSlider = document.getElementById('volumeSlider');

        const audioTracks = {
            default: { name: "Default Music", url: "https://github.com/murt391/dllontop/raw/refs/heads/main/thepenis.mp3" },
            lofi: { name: "Wii Menu", url: "https://github.com/murt391/dllontop/raw/refs/heads/main/wii.mp3" },
            chill: { name: "Wii Shop", url: "https://github.com/murt391/dllontop/raw/refs/heads/main/wii2.mp3" },
            charlie: { name: "Wii Shop", url: "https://github.com/murt391/dllontop/raw/refs/heads/main/charlie-kirky-funk.mp3" },
            none: { name: "None (Mute)", url: "" }
        };

        // Load saved settings
        const savedMusic = localStorage.getItem('dll-music-url') || audioTracks.default.url;
        const savedVolume = localStorage.getItem('dll-music-volume') || "1";

        musicSource.src = savedMusic;
        bgMusic.volume = parseFloat(savedVolume);
        volumeSlider.value = savedVolume;

        // Set select value
        for (const key in audioTracks) {
            if (audioTracks[key].url === savedMusic) {
                musicSelect.value = key;
            }
        }

        // Music selection change
        musicSelect.addEventListener('change', (e) => {
            const track = audioTracks[e.target.value];
            if (track.url) {
                musicSource.src = track.url;
                localStorage.setItem('dll-music-url', track.url);
                bgMusic.load();
                bgMusic.play().catch(() => {});
            } else {
                bgMusic.pause();
                localStorage.setItem('dll-music-url', '');
            }
        });

        // Volume change
        volumeSlider.addEventListener('input', (e) => {
            const vol = e.target.value;
            bgMusic.volume = parseFloat(vol);
            localStorage.setItem('dll-music-volume', vol);
        });

        const startMusic = () => {
            bgMusic.play().catch(() => {});
            document.removeEventListener('click', startMusic);
        };
        document.addEventListener('click', startMusic);
    </script>
</body>
</html>
