<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>dll. | settings</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #1a0033;
            --gradient-start: #3a0066;
            --gradient-end: #0d001a;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--bg-color);
            background: radial-gradient(circle at center, var(--gradient-start) 0%, var(--gradient-end) 100%);
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            font-family: 'Fredoka', sans-serif;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        #particleCanvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        .settings-card {
            position: relative;
            z-index: 2;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 30px;
            padding: 40px;
            width: 90%;
            max-width: 450px;
            text-align: center;
        }

        h1 {
            font-size: 2.5rem;
            margin-bottom: 20px;
            font-weight: 700;
        }

        .setting-group {
            margin-bottom: 30px;
            text-align: left;
        }

        label {
            display: block;
            margin-bottom: 10px;
            font-size: 1.1rem;
            opacity: 0.8;
        }

        .theme-select {
            width: 100%;
            padding: 12px 20px;
            border-radius: 15px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: white;
            font-family: 'Fredoka', sans-serif;
            font-size: 1rem;
            outline: none;
            cursor: pointer;
            appearance: none;
            background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='white' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3e%3cpolyline points='6 9 12 15 18 9'%3e%3c/polyline%3e%3c/svg%3e");
            background-repeat: no-repeat;
            background-position: right 15px center;
            background-size: 15px;
        }

        .theme-select option {
            background: #1a0033;
            color: white;
        }

        .back-btn {
            display: inline-block;
            margin-top: 10px;
            color: rgba(255, 255, 255, 0.6);
            text-decoration: none;
            transition: color 0.3s;
        }

        .back-btn:hover {
            color: white;
        }
    </style>
</head>
<body>
    <canvas id="particleCanvas"></canvas>

    <div class="settings-card">
        <h1>settings</h1>
        
        <div class="setting-group">
            <label for="themeSelect">choose theme</label>
            <select id="themeSelect" class="theme-select" onchange="handleThemeChange(this.value)">
                <option value="purple">original (purple)</option>
                <option value="midnight">midnight blue</option>
                <option value="forest">deep forest</option>
                <option value="ocean">ocean breeze</option>
                <option value="sunset">crimson sunset</option>
                <option value="void">the void</option>
                <option value="nebula">cosmic nebula</option>
                <option value="emerald">emerald city</option>
                <option value="rose">rose petal</option>
                <option value="gold">golden hour</option>
                <option value="cyber">cyberpunk</option>
                <option value="arctic">arctic frost</option>
                <option value="lava">lava flow</option>
                <option value="toxic">toxic waste</option>
                <option value="space">deep space</option>
                <option value="candy">cotton candy</option>
                <option value="royal">royal velvet</option>
            </select>
        </div>

        <a href="index.html" class="back-btn">← back to home</a>
    </div>

    <script>
        const themes = {
            purple: { start: '#3a0066', end: '#0d001a' },
            midnight: { start: '#004e92', end: '#000428' },
            forest: { start: '#004d33', end: '#001a11' },
            ocean: { start: '#0077be', end: '#002b4d' },
            sunset: { start: '#8b0000', end: '#330000' },
            void: { start: '#333333', end: '#000000' },
            nebula: { start: '#6a008a', end: '#2d004d' },
            emerald: { start: '#008f39', end: '#002b11' },
            rose: { start: '#e0115f', end: '#4d001a' },
            gold: { start: '#d4af37', end: '#4d3d00' },
            cyber: { start: '#ff00ff', end: '#000033' },
            arctic: { start: '#00ffff', end: '#003333' },
            lava: { start: '#ff4500', end: '#330e00' },
            toxic: { start: '#39ff14', end: '#0d3300' },
            space: { start: '#1b2735', end: '#090a0f' },
            candy: { start: '#ff69b4', end: '#ffc0cb' },
            royal: { start: '#4b0082', end: '#1a0033' }
        };

        function handleThemeChange(themeKey) {
            const theme = themes[themeKey];
            if (theme) {
                setTheme(themeKey, theme.start, theme.end);
            }
        }

        function setTheme(name, start, end) {
            document.documentElement.style.setProperty('--gradient-start', start);
            document.documentElement.style.setProperty('--gradient-end', end);
            localStorage.setItem('dll-theme-start', start);
            localStorage.setItem('dll-theme-end', end);
            localStorage.setItem('dll-theme-name', name);
            document.getElementById('themeSelect').value = name;
        }

        // Init
        const savedName = localStorage.getItem('dll-theme-name') || 'purple';
        const theme = themes[savedName];
        setTheme(savedName, theme.start, theme.end);

        // Particle System
        const canvas = document.getElementById('particleCanvas');
        const ctx = canvas.getContext('2d');
        let particles = [];
        const particleCount = 100;
        window.addEventListener('resize', initCanvas);
        function initCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            createParticles();
        }
        class Particle {
            constructor() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.size = Math.random() * 1.5 + 0.5;
                this.speedX = (Math.random() - 0.5) * 0.4;
                this.speedY = (Math.random() - 0.5) * 0.4;
            }
            update() {
                this.x += this.speedX;
                this.y += this.speedY;
                if (this.x > canvas.width) this.x = 0; else if (this.x < 0) this.x = canvas.width;
                if (this.y > canvas.height) this.y = 0; else if (this.y < 0) this.y = canvas.height;
            }
            draw() {
                ctx.fillStyle = 'rgba(255, 255, 255, 0.5)';
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
            }
        }
        function createParticles() {
            particles = [];
            for (let i = 0; i < particleCount; i++) particles.push(new Particle());
        }
        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            for (let i = 0; i < particles.length; i++) {
                particles[i].update();
                particles[i].draw();
            }
            requestAnimationFrame(animate);
        }
        initCanvas();
        animate();
    </script>
</body>
</html>
