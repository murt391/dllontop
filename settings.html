<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>dll | settings</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Calistoga&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: url('https://raw.githubusercontent.com/murt391/dllontop/main/pnfe3hsy5d4c1.png') no-repeat center center fixed;
            background-size: cover;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Calistoga', serif;
            color: white;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.4);
            z-index: 1;
            pointer-events: none;
        }

        .settings-container {
            position: relative;
            z-index: 2;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 30px;
            padding: 40px;
            max-width: 500px;
            width: 90%;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
        }

        .settings-title {
            font-size: 2rem;
            margin-bottom: 30px;
            text-align: center;
            color: white;
        }

        .settings-section {
            margin-bottom: 30px;
        }

        .section-label {
            font-size: 1.1rem;
            margin-bottom: 12px;
            color: #b4a1ff;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .volume-control {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        input[type="range"] {
            flex: 1;
            height: 6px;
            border-radius: 3px;
            background: rgba(255, 255, 255, 0.2);
            outline: none;
            -webkit-appearance: none;
            appearance: none;
        }

        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 18px;
            height: 18px;
            border-radius: 50%;
            background: #b4a1ff;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        input[type="range"]::-moz-range-thumb {
            width: 18px;
            height: 18px;
            border-radius: 50%;
            background: #b4a1ff;
            cursor: pointer;
            border: none;
            transition: all 0.3s ease;
        }

        input[type="range"]::-webkit-slider-thumb:hover {
            transform: scale(1.2);
            box-shadow: 0 0 10px rgba(180, 161, 255, 0.6);
        }

        .volume-value {
            min-width: 40px;
            text-align: right;
            color: white;
            font-size: 0.9rem;
        }

        select {
            width: 100%;
            padding: 12px 15px;
            border-radius: 15px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            background: rgba(0, 0, 0, 0.4);
            color: white;
            font-family: 'Calistoga', serif;
            font-size: 1rem;
            outline: none;
            transition: all 0.3s ease;
            cursor: pointer;
        }

        select:hover, select:focus {
            background: rgba(0, 0, 0, 0.6);
            border-color: #b4a1ff;
            box-shadow: 0 0 15px rgba(180, 161, 255, 0.2);
        }

        select option {
            background: #0d001a;
            color: white;
        }

        .back-btn {
            display: block;
            margin-top: 30px;
            padding: 12px 30px;
            background: rgba(180, 161, 255, 0.2);
            border: 1px solid #b4a1ff;
            color: white;
            text-decoration: none;
            border-radius: 20px;
            text-align: center;
            font-family: 'Calistoga', serif;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: lowercase;
        }

        .back-btn:hover {
            background: rgba(180, 161, 255, 0.4);
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(180, 161, 255, 0.3);
        }

        .back-link {
            position: fixed;
            top: 20px;
            left: 20px;
            z-index: 3;
            color: white;
            text-decoration: none;
            opacity: 0.8;
            transition: all 0.3s;
            font-size: 1rem;
            text-shadow: 0 2px 4px rgba(0, 0, 0, 0.5);
        }

        .back-link:hover {
            opacity: 1;
            color: #b4a1ff;
        }

        #bgMusic {
            display: none;
        }
    </style>
</head>
<body>
    <a href="index.html" class="back-link">← back</a>

    <div class="settings-container">
        <h1 class="settings-title">settings</h1>

        <div class="settings-section">
            <div class="section-label">volume</div>
            <div class="volume-control">
                <input type="range" id="volumeSlider" min="0" max="100" value="100">
                <span class="volume-value" id="volumeValue">100%</span>
            </div>
        </div>

        <div class="settings-section">
            <div class="section-label">music</div>
            <select id="musicSelect">
                <option value="https://github.com/murt391/dllontop/raw/refs/heads/main/thepenis.mp3">Default Music</option>
            </select>
        </div>

        <a href="index.html" class="back-btn">back to home</a>
    </div>

    <audio id="bgMusic" loop>
        <source id="musicSource" src="https://github.com/murt391/dllontop/raw/refs/heads/main/thepenis.mp3" type="audio/mpeg">
    </audio>

    <script>
        const bgMusic = document.getElementById('bgMusic');
        const musicSource = document.getElementById('musicSource');
        const volumeSlider = document.getElementById('volumeSlider');
        const volumeValue = document.getElementById('volumeValue');
        const musicSelect = document.getElementById('musicSelect');

        // Audio tracks table - you can add more songs here
        const audioTracks = {
            default: { name: "Default Music", url: "https://github.com/murt391/dllontop/raw/refs/heads/main/thepenis.mp3" },
            lofi: { name: "Wii Menu", url: "https://github.com/murt391/dllontop/raw/refs/heads/main/wii.mp3" },
            chill: { name: "Wii Shop", url: "https://github.com/murt391/dllontop/raw/refs/heads/main/wii2.mp3" },
            charlie: { name: "charlie kirk funk", url: "https://github.com/murt391/dllontop/raw/refs/heads/main/charlie-kirky-funk.mp3" },
            hamood: { name: "hamood habibi", url: "https://github.com/murt391/dllontop/raw/refs/heads/main/HAMOOD HABIBI FUNK.mp3" },
            none: { name: "None (Mute)", url: "" }

        };

        // Populate music dropdown
        for (const key in audioTracks) {
            if (key !== 'default') {
                const option = document.createElement('option');
                option.value = audioTracks[key].url;
                option.textContent = audioTracks[key].name;
                musicSelect.appendChild(option);
            }
        }

        // Load saved settings
        const savedVolume = localStorage.getItem('dll-music-volume') || '1';
        const savedMusic = localStorage.getItem('dll-music-url') || audioTracks.default.url;

        // Apply saved settings
        bgMusic.volume = parseFloat(savedVolume);
        volumeSlider.value = parseFloat(savedVolume) * 100;
        volumeValue.textContent = Math.round(parseFloat(savedVolume) * 100) + '%';
        musicSource.src = savedMusic;
        musicSelect.value = savedMusic;

        // Volume control
        volumeSlider.addEventListener('input', (e) => {
            const volume = e.target.value / 100;
            bgMusic.volume = volume;
            volumeValue.textContent = e.target.value + '%';
            localStorage.setItem('dll-music-volume', volume);
        });

        // Music selection
        musicSelect.addEventListener('change', (e) => {
            musicSource.src = e.target.value;
            localStorage.setItem('dll-music-url', e.target.value);
            bgMusic.load();
            bgMusic.play().catch(() => {});
        });

        // Start music on interaction
        const startMusic = () => {
            bgMusic.play().catch(() => {});
            document.removeEventListener('click', startMusic);
            document.removeEventListener('keydown', startMusic);
        };

        document.addEventListener('click', startMusic);
        document.addEventListener('keydown', startMusic);

        window.addEventListener('load', () => {
            bgMusic.play().catch(() => {});
        });
    </script>
</body>
</html>
